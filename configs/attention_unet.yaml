data:
  data_root: data/src_1/BraTS2021_Training_Data
  splits_path: data/splits.json
  batch_size: 1
  num_workers: 0
  max_train_samples: 150
  max_val_samples: 50
  npy_cache_dir: cache_npy
  patch_size: [128, 128, 128]
  val_fraction: 0.2
  seed: 42

model:
  name: AttentionUNet3D
  in_channels: 4
  out_channels: 3
  features: [32, 64, 128, 256]

loss:
  name: BCEDiceLoss
  bce_weight: 0.5
  dice_weight: 0.5

training:
  epochs: 100  
  # epochs: 5 # For testing
  lr: 0.0001
  weight_decay: 0.00001
  scheduler: cosine
  plateau_patience: 10
  plateau_factor: 0.5
  amp: true

logging:
  experiment_name: brain_tumor_seg
  run_name: attention_unet_baseline
  output_dir: outputs
  checkpoint_dir: checkpoints/attention_unet
